name: Release Please

on:
  workflow_call:
    inputs:
      manifest-file:
        required: false
        type: string
        default: .github/.release-please-manifest.json

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple
          initial-version: 0.1.0
          manifest-file: ${{ inputs.manifest-file }}
