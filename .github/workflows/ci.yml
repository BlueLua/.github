name: CI

on:
  workflow_call:
    inputs:
      linux:
        description: "Run tests on Linux"
        type: boolean
        default: true
      macos:
        description: "Run tests on macOS"
        type: boolean
        default: false
      windows:
        description: "Run tests on Windows"
        type: boolean
        default: false
      luacheck:
        description: "Run Luacheck static analysis"
        type: boolean
        default: false
      lua-language-server:
        description: "LLS"
        type: boolean
        default: false
      markdownlint:
        description: "Run markdownlint-cli2 on Markdown"
        type: boolean
        default: false
      tests:
        description: "Run Busted unit tests"
        type: boolean
        default: false
      run:
        description: "Custom shell commands to run before building/testing"
        type: string
        default: ""
      release-please:
        description: "Run Release Please"
        type: boolean
        default: false
      publish-dev:
        description: "Publish development version to LuaRocks"
        type: boolean
        default: false
      publish-release:
        description: "Publish release version to LuaRocks"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  metadata:
    name: Detect Metadata
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.run-luacheck == 'true' ||
        inputs.luacheck ||
        needs.changes.outputs.run-tests == 'true' ||
        inputs.tests ||
        needs.changes.outputs.run-publish-dev == 'true' ||
        needs.changes.outputs.run-publish-release == 'true'
      }}
    runs-on: ubuntu-latest
    outputs:
      source-dir: ${{ steps.detect.outputs.source-dir }}
      package-name: ${{ steps.detect.outputs.package-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Determine metadata
        id: detect
        run: |
          echo "source-dir=$([ -d 'src' ] && echo 'src' || echo 'lua')" >> "$GITHUB_OUTPUT"

          ROCKSPEC=$(find . -maxdepth 1 -name "*.rockspec" -print -quit)
          if [ -n "$ROCKSPEC" ]; then
            PACKAGE_NAME=$(awk -F'"' '/^[[:space:]]*package[[:space:]]*=/{print $2}' "$ROCKSPEC")
          else
            echo "Error: No rockspec file found in the root directory." >&2
            exit 1
          fi
          echo "package-name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

  # NOTE: The `if` condition below is intentionally duplicated from the `tests` job.
  # GitHub Actions has no way to share a condition, so both must be kept in sync.
  matrix:
    name: Setup Matrix
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.run-tests == 'true' ||
        inputs.tests ||
        needs.changes.outputs.run-publish-dev == 'true' ||
        needs.changes.outputs.run-publish-release == 'true'
      }}
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.os-matrix.outputs.os }}
    steps:
      - name: Determine OS matrix
        id: os-matrix
        run: |
          OS_LIST=""
          [ "${{ inputs.linux   }}" = "true" ] && OS_LIST="$OS_LIST, \"ubuntu-latest\""
          [ "${{ inputs.macos   }}" = "true" ] && OS_LIST="$OS_LIST, \"macos-latest\""
          [ "${{ inputs.windows }}" = "true" ] && OS_LIST="$OS_LIST, \"windows-latest\""
          OS_LIST="[${OS_LIST#, }]"
          [ "$OS_LIST" = "[]" ] && OS_LIST='["ubuntu-latest"]'
          echo "os=$OS_LIST" >> "$GITHUB_OUTPUT"

  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    outputs:
      run-stylua: ${{ steps.filter.outputs.stylua || 'false' }}
      run-luacheck: ${{ steps.filter.outputs.luacheck || 'false' }}
      run-markdownlint: ${{ steps.filter.outputs.markdownlint || 'false' }}
      run-prettier: ${{ steps.filter.outputs.prettier || 'false' }}
      run-shfmt: ${{ steps.filter.outputs.shfmt || 'false' }}
      run-toml: ${{ steps.filter.outputs.toml || 'false' }}
      run-tests: ${{ steps.filter.outputs.tests || 'false' }}
      run-lua-language-server: ${{ steps.filter.outputs.lua_language_server || 'false' }}
      run-release-please: ${{ steps.filter.outputs.release_please || 'false' }}
      run-publish-dev: >-
        ${{
          inputs.publish-dev ||
          (steps.filter.outputs.rockspec == 'true' && github.ref_name == 'main') ||
          (steps.filter.outputs.publish_dev == 'true' && github.ref_name == 'main')
        }}
      run-publish-release: ${{ inputs.publish-release || startsWith(github.ref, 'refs/tags/') }}
      run-sync: ${{ steps.filter.outputs.config || 'false' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Check for changes
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            config:
              - '.github/config.json'
            stylua:
              - '**/*.lua'
              - '.stylua.toml'
            luacheck:
              - 'src/**/*.lua'
              - 'lua/**/*.lua'
            markdownlint:
              - '**/!(CHANGELOG).md'
              - '.markdownlint*'
            prettier:
              - '**/*.json'
              - '**/*.jsonc'
              - '**/*.yml'
              - '**/*.yaml'
              - '.prettierrc*'
            shfmt:
              - '**/*.bash'
              - '**/*.sh'
              - '**/*.zsh'
            toml:
              - '**/*.toml'
            tests:
              - '.busted'
              - '*.rockspec'
              - '**/*.c'
              - '**/*.h'
              - '**/*.test.lua'
              - 'lua/**/*.lua'
              - 'src/**/*.lua'
              - 'tests/**'
            release_please:
              - 'src/**'
              - 'lua/**'
              - '.github/release-please-manifest.json'
              - '.github/release-please-config.json'
            types:
              - '**/*.d.lua'
              - 'README.md'
            rockspec:
              - '*.rockspec'
            publish_dev:
              - '**/*.d.lua'
            publish_release:
              - '**/*.d.lua'
            lua_language_server:
              - '**/*.lua'
              - '.luarc.json'

  format:
    needs: changes
    if: >-
      ${{
        needs.changes.outputs.run-stylua == 'true' ||
        needs.changes.outputs.run-prettier == 'true' ||
        needs.changes.outputs.run-shfmt == 'true' ||
        needs.changes.outputs.run-toml == 'true'
      }}
    name: Auto-Format Code
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Run StyLua Formatter
        if: ${{ needs.changes.outputs.run-stylua == 'true' }}
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: .

      - name: Run Prettier Formatter
        if: ${{ needs.changes.outputs.run-prettier == 'true' }}
        run: |
          files=$(git ls-files "*.json" "*.jsonc" "*.yml" "*.yaml" 2>/dev/null | tr '\n' ' ')
          if [ -n "$files" ]; then
            npx prettier --write $files
          else
            echo "No JSON, JSONC, or YAML files to format."
          fi

      - name: Install shfmt
        if: ${{ needs.changes.outputs.run-shfmt == 'true' }}
        run: |
          mkdir -p ~/.local/bin
          gh release download -R mvdan/sh -p "*linux_amd64" --dir ~/.local/bin --clobber
          mv ~/.local/bin/*linux_amd64 ~/.local/bin/shfmt
          chmod +x ~/.local/bin/shfmt
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run shfmt Formatter
        if: ${{ needs.changes.outputs.run-shfmt == 'true' }}
        run: |
          files=$(git ls-files "*.sh" "*.bash" "*.zsh" 2>/dev/null | tr '\n' ' ')
          if [ -n "$files" ]; then
            shfmt -w -i 2 -ci $files
          else
            echo "No shell script files to format."
          fi

      - name: Run taplo Formatter
        if: ${{ needs.changes.outputs.run-toml == 'true' }}
        run: |
          files=$(git ls-files "*.toml" 2>/dev/null | tr '\n' ' ')
          if [ -n "$files" ]; then
            taplo fmt $files
          else
            echo "No TOML files to format."
          fi

      - name: Commit and Push Formatted Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff-index --quiet HEAD; then
            git commit -m "style: auto-format"
            git push
          fi

  luacheck:
    needs: [changes, metadata]
    if: ${{ needs.changes.outputs.run-luacheck == 'true' || inputs.luacheck }}
    name: Luacheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run Luacheck
        uses: lunarmodules/luacheck@v1
        with:
          args: ${{ needs.metadata.outputs.source-dir }}

  lua-language-server:
    needs: changes
    if: ${{ needs.changes.outputs.run-lua-language-server == 'true' || inputs.lua-language-server }}
    name: Lua Language Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Clone LuaCATS dependencies
        run: |
          mkdir -p ~/.local/share/lua/types
          cd ~/.local/share/lua/types
          git clone --depth 1 https://github.com/LuaCATS/busted.git
          git clone --depth 1 https://github.com/LuaCATS/luassert.git
          git clone --depth 1 https://github.com/LuaCATS/luafilesystem.git

      - name: Install lua-language-server
        run: |
          mkdir -p ~/.local/share/lua-language-server
          gh release download -R LuaLS/lua-language-server -p "*linux-x64.tar.gz" --dir ~/.local/share/lua-language-server --clobber
          cd ~/.local/share/lua-language-server
          tar -xzf *.tar.gz
          rm *.tar.gz
          echo "$HOME/.local/share/lua-language-server/bin" >> $GITHUB_PATH
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Lua Language Server check
        run: lua-language-server --check .

  markdownlint:
    needs: changes
    if: ${{ needs.changes.outputs.run-markdownlint == 'true' || inputs.markdownlint }}
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run markdownlint-cli2
        run: npx markdownlint-cli2 "**/*.md" "#CHANGELOG.md"

  tests:
    needs: [changes, matrix, metadata]
    if: >-
      ${{
        needs.changes.outputs.run-tests == 'true' ||
        inputs.tests ||
        needs.changes.outputs.run-publish-dev == 'true' ||
        needs.changes.outputs.run-publish-release == 'true'
      }}
    name: Run Tests (${{ matrix.os }}, ${{ matrix.lua-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        lua-version: ["5.1", "5.2", "5.3", "5.4", "5.5", "luajit"]
        os: ${{ fromJSON(needs.matrix.outputs.os) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup MSVC Developer Command Prompt
        if: ${{ runner.os == 'Windows' && matrix['lua-version'] != 'luajit' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Lua
        uses: luarocks/gh-actions-lua@master
        with:
          luaVersion: ${{ matrix.lua-version }}

      - name: Install LuaRocks
        uses: luarocks/gh-actions-luarocks@master

      - name: Run custom setup commands
        if: ${{ inputs.run != '' }}
        shell: bash
        env:
          SETUP_COMMANDS: ${{ inputs.run }}
        run: bash -c "$SETUP_COMMANDS"

      # pwsh is used here instead of bash because on Windows, bash (Git Bash) mangles
      # native paths in the luarocks config, causing LuaJIT detection to fail.
      # pwsh is pre-installed on all GitHub-hosted runners (Linux, macOS, Windows).
      - name: Install package
        shell: pwsh
        run: |
          $rockspec = Get-ChildItem -Path . -Filter "*.rockspec" | Select-Object -First 1
          if (-not $rockspec) { Write-Error "No rockspec file found."; exit 1 }
          luarocks install "$($rockspec.FullName)"

      - name: Install Busted
        run: luarocks install busted

      - name: Run Tests
        run: busted

  release-please:
    needs: changes
    if: ${{ inputs.release-please || (needs.changes.outputs.run-release-please == 'true' && github.ref_name == 'main') }}
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish-luarocks:
    # `tests` being skipped (not failed) does not block this job — that is intentional:
    # publish can be triggered independently of whether tests ran (e.g. rockspec-only change).
    needs: [tests, changes, metadata]
    if: ${{ needs.changes.outputs.run-publish-dev == 'true' || needs.changes.outputs.run-publish-release == 'true' }}
    name: Publish to LuaRocks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Lua
        uses: luarocks/gh-actions-lua@master
        with:
          luaVersion: "5.5"

      - name: Install LuaRocks
        uses: luarocks/gh-actions-luarocks@master

      - name: Build and Upload to LuaRocks
        shell: bash
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          set -euo pipefail

          ROCKSPEC=$(find . -maxdepth 1 -name "*.rockspec" -print -quit)
          if [ -z "$ROCKSPEC" ]; then
            echo "Error: No rockspec file found in the root directory." >&2
            exit 1
          fi

          if [ "${{ needs.changes.outputs.run-publish-release }}" == "true" ]; then
            MANIFEST=".github/release-please-manifest.json"
            if [ ! -f "$MANIFEST" ]; then
              echo "Error: Release Please manifest not found at $MANIFEST." >&2
              exit 1
            fi

            VERSION=$(jq -r '."." // empty' "$MANIFEST")
            if [ -z "$VERSION" ]; then
              echo "Error: Release version not found. Make sure $MANIFEST contains a root package version." >&2
              exit 1
            fi

            TAG="v${VERSION}"
            BASE_VERSION="$VERSION"

            # Bump revision if version already exists on LuaRocks.
            REVISION=1
            while luarocks search --porcelain "${{ needs.metadata.outputs.package-name }}" "${BASE_VERSION}-${REVISION}" 2>/dev/null | grep -qF "${BASE_VERSION}-${REVISION}"; do
              echo "Version ${BASE_VERSION}-${REVISION} already exists on LuaRocks, trying revision $((REVISION + 1))..."
              REVISION=$((REVISION + 1))
            done
            VERSION="${BASE_VERSION}-${REVISION}"

            ROCKSPEC_FILENAME="${{ needs.metadata.outputs.package-name }}-${VERSION}.rockspec"
            sed -e "s/version = .*/version = \"${VERSION}\"/" \
                -e "/[[:space:]]*tag = .*/d" \
                -e "s/source = {/source = {\n  tag = \"${TAG}\",/" \
                "$ROCKSPEC" > "$ROCKSPEC_FILENAME"
          else
            # Dev publish: upload the existing rockspec as-is.
            ROCKSPEC_FILENAME=$(basename "$ROCKSPEC")
          fi

          echo "Generated/loaded rockspec content:"
          cat "$ROCKSPEC_FILENAME"

          # Upload to LuaRocks
          luarocks upload "$ROCKSPEC_FILENAME" --api-key="${LUAROCKS_API_KEY}" --force

  sync:
    needs: changes
    if: ${{ needs.changes.outputs.run-sync == 'true' }}
    name: Sync CI
    runs-on: ubuntu-latest
    steps:
      - name: Auto-sync files
        run: |
          if [ -n "$GH_TOKEN" ]; then
            echo "Running central repository sync..."
            gh workflow run sync.yml --repo BlueLua/.github
          else
            echo "GH_PAT secret not available in this repository. Please configure it to enable auto-sync."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
