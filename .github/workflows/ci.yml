name: CI

on:
  workflow_call:
    inputs:
      linux:
        description: "Run tests on Linux (ubuntu-latest)"
        type: boolean
        default: true
      macos:
        description: "Run tests on macOS (macos-latest)"
        type: boolean
        default: false
      windows:
        description: "Run tests on Windows (windows-latest)"
        type: boolean
        default: false
      stylua:
        description: "Run StyLua formatter linting"
        type: boolean
        default: false
      luacheck:
        description: "Run Luacheck static analysis"
        type: boolean
        default: false
      prettier:
        description: "Run Prettier formatting check on Markdown"
        type: boolean
        default: false
      tests:
        description: "Run Busted unit tests"
        type: boolean
        default: false
      run:
        description: "Custom shell commands to run before building/testing"
        type: string
        default: ""
      docs:
        description: "Trigger bluelua.github.io docs generation on types change"
        type: boolean
        default: false
      release-please:
        description: "Run Release Please"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  detect-source-dir:
    name: Detect Source Directory
    runs-on: ubuntu-latest
    outputs:
      source-dir: ${{ steps.detect.outputs.source-dir }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine source directory
        id: detect
        run: echo "source-dir=$([ -d "src" ] && echo "src" || echo "lua")" >> "$GITHUB_OUTPUT"

  changes:
    name: Change Detection
    needs: detect-source-dir
    runs-on: ubuntu-latest
    outputs:
      run-stylua: ${{ steps.process.outputs.run-stylua }}
      run-luacheck: ${{ steps.process.outputs.run-luacheck }}
      run-prettier: ${{ steps.process.outputs.run-prettier }}
      run-tests: ${{ steps.process.outputs.run-tests }}
      run-docs: ${{ steps.process.outputs.run-docs }}
      run-release-please: ${{ steps.process.outputs.run-release-please }}
      os: ${{ steps.os-matrix.outputs.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          list-files: "shell"
          filters: |
            changes:
              - '**/*.c'
              - '**/*.h'
              - '**/*.lua'
              - '**/*.md'
              - 'CHANGELOG.md'
              - '.busted'
              - '.stylua.toml'
              - '.prettierrc*'
            types:
              - 'types/**'

      - name: Process changes
        id: process
        run: |
          FILES='${{ steps.filter.outputs.changes_files }}'
          SRC_DIR='${{ needs.detect-source-dir.outputs.source-dir }}'

          RUN_STYLUA="false"
          RUN_LUACHECK="false"
          RUN_PRETTIER="false"
          RUN_TESTS="false"
          RUN_DOCS="false"
          RUN_RELEASE_PLEASE="false"

          # Only run path-based change detection if not manually triggered via workflow_dispatch
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            if [ -n "$FILES" ]; then
              eval "for f in $FILES; do
                if [ -f \"\$f\" ]; then
                  # StyLua
                  if [[ \"\$f\" =~ \.lua$ ]] || \
                     [[ \"\$f\" =~ \.stylua\.toml$ ]]; then
                    RUN_STYLUA=\"true\"
                  fi

                  # Luacheck
                  if [[ \"\$f\" =~ \.lua$ ]] && \
                     [[ \"\$f\" =~ ^$SRC_DIR/ ]]; then
                    RUN_LUACHECK=\"true\"
                  fi

                  # Prettier
                  if ( [[ \"\$f\" =~ \.md$ ]] && [[ ! \"\$f\" =~ CHANGELOG\.md$ ]] ) || \
                     [[ \"\$f\" =~ \.prettierrc ]]; then
                    RUN_PRETTIER=\"true\"
                  fi

                  # Busted
                  if [[ \"\$f\" =~ \.test\.lua$ ]] || \
                     [[ \"\$f\" =~ ^tests/ ]] || \
                     [[ \"\$f\" =~ \.c$ ]] || \
                     [[ \"\$f\" =~ \.h$ ]] || \
                     [[ \"\$f\" =~ \.busted$ ]]; then
                    RUN_TESTS=\"true\"
                  fi

                  # Release Please
                  if [[ \"\$f\" =~ ^$SRC_DIR/ ]] || \
                     [[ \"\$f\" =~ ^CHANGELOG\.md$ ]]; then
                    RUN_RELEASE_PLEASE=\"true\"
                  fi
                fi
              done"
            fi

            # Check for types changes using paths-filter output
            if [ "${{ steps.filter.outputs.types }}" = "true" ]; then
              RUN_DOCS="true"
            fi
          fi

          echo "run-stylua=$RUN_STYLUA"                 >> "$GITHUB_OUTPUT"
          echo "run-luacheck=$RUN_LUACHECK"             >> "$GITHUB_OUTPUT"
          echo "run-prettier=$RUN_PRETTIER"             >> "$GITHUB_OUTPUT"
          echo "run-tests=$RUN_TESTS"                   >> "$GITHUB_OUTPUT"
          echo "run-docs=$RUN_DOCS"                     >> "$GITHUB_OUTPUT"
          echo "run-release-please=$RUN_RELEASE_PLEASE" >> "$GITHUB_OUTPUT"

      # Fallback to Linux if no OS was selected
      - name: Determine OS matrix
        id: os-matrix
        run: |
          OS_LIST=""
          [ "${{ inputs.linux   }}" = "true" ] && OS_LIST="$OS_LIST, \"ubuntu-latest\""
          [ "${{ inputs.macos   }}" = "true" ] && OS_LIST="$OS_LIST, \"macos-latest\""
          [ "${{ inputs.windows }}" = "true" ] && OS_LIST="$OS_LIST, \"windows-latest\""
          OS_LIST="[${OS_LIST#, }]"
          [ "$OS_LIST" = "[]" ] && OS_LIST='["ubuntu-latest"]'
          echo "os=$OS_LIST" >> "$GITHUB_OUTPUT"

  stylua:
    needs: changes
    if: ${{ needs.changes.outputs.run-stylua == 'true' || inputs.stylua }}
    name: StyLua
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run StyLua
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

  luacheck:
    needs: [changes, detect-source-dir]
    if: ${{ needs.changes.outputs.run-luacheck == 'true' || inputs.luacheck }}
    name: Luacheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Luacheck
        uses: lunarmodules/luacheck@v1
        with:
          args: ${{ needs.detect-source-dir.outputs.source-dir }}

  prettier:
    needs: changes
    if: ${{ needs.changes.outputs.run-prettier == 'true' || inputs.prettier }}
    name: Prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Prettier
        run: npx prettier --check "**/*.md" "!CHANGELOG.md"

  tests:
    needs: changes
    if: ${{ needs.changes.outputs.run-tests == 'true' || inputs.tests }}
    name: Run Tests (${{ matrix.os }}, ${{ matrix.lua-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        lua-version: ["5.1", "5.2", "5.3", "5.4", "5.5", "luajit"]
        os: ${{ fromJSON(needs.changes.outputs.os) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup MSVC Developer Command Prompt
        if: ${{ runner.os == 'Windows' && matrix.lua-version != 'luajit' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Lua
        uses: hishamhm/gh-actions-lua@master
        with:
          luaVersion: ${{ matrix.lua-version }}

      - name: Install LuaRocks
        uses: hishamhm/gh-actions-luarocks@master
        with:
          luaRocksVersion: "3.13.0"

      - name: Run custom setup commands
        if: ${{ inputs.run != '' }}
        shell: bash
        env:
          SETUP_COMMANDS: ${{ inputs.run }}
        run: |
          echo "$SETUP_COMMANDS" > temp_setup.sh
          chmod +x temp_setup.sh
          ./temp_setup.sh
          rm temp_setup.sh

      - name: Locate rockspec
        id: rockspec
        shell: bash
        run: |
          file=$(ls rockspecs/*scm*.rockspec 2>/dev/null | head -n 1)
          if [ -z "$file" ]; then
            echo "Error: No scm rockspec found in rockspecs/ directory."
            exit 1
          fi
          echo "path=$file" >> "$GITHUB_OUTPUT"

      - name: Install package
        run: luarocks make ${{ steps.rockspec.outputs.path }}

      - name: Install Busted
        run: luarocks install busted

      - name: Run Tests
        run: busted

  docs:
    needs: changes
    if: ${{ (needs.changes.outputs.run-docs == 'true' || inputs.docs) && github.ref_name == 'main' }}
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Run bluelua.github.io docs
        run: |
          gh workflow run docs.yml --repo BlueLua/bluelua.github.io
        env:
          GH_TOKEN: ${{ secrets.DOCS_TRIGGER_TOKEN }}

  release-please:
    needs: changes
    if: >-
      ${{
        inputs.release-please &&
        (needs.changes.outputs.run-release-please == 'true' || github.event_name == 'workflow_dispatch') &&
        github.ref_name == 'main'
      }}
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
