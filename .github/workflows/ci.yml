name: CI

on:
  workflow_call:
    inputs:
      linux:
        description: "Run tests on Linux"
        type: boolean
        default: true
      macos:
        description: "Run tests on macOS"
        type: boolean
        default: false
      windows:
        description: "Run tests on Windows"
        type: boolean
        default: false
      stylua:
        description: "Run StyLua formatter linting"
        type: boolean
        default: false
      luacheck:
        description: "Run Luacheck static analysis"
        type: boolean
        default: false
      markdownlint:
        description: "Run markdownlint-cli2 on Markdown"
        type: boolean
        default: false
      tests:
        description: "Run Busted unit tests"
        type: boolean
        default: false
      run:
        description: "Custom shell commands to run before building/testing"
        type: string
        default: ""
      docs:
        description: "Trigger bluelua.github.io docs generation on types change"
        type: boolean
        default: false
      release-please:
        description: "Run Release Please"
        type: boolean
        default: false
      luarocks-upload:
        description: "Upload the package to LuaRocks"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  metadata:
    name: Detect Metadata
    runs-on: ubuntu-latest
    outputs:
      source-dir: ${{ steps.detect.outputs.source-dir }}
      package-name: ${{ steps.detect.outputs.package-name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine metadata
        id: detect
        run: |
          echo "source-dir=$([ -d "src" ] && echo "src" || echo "lua")" >> "$GITHUB_OUTPUT"

          ROCKSPEC=$(find . -maxdepth 1 -name "*.rockspec" -print -quit)
          if [ -n "$ROCKSPEC" ]; then
            ROCKSPEC_BASE=$(basename "$ROCKSPEC")
            TEMP_NAME="${ROCKSPEC_BASE%.rockspec}"
            TEMP_NAME="${TEMP_NAME%-*}"
            PACKAGE_NAME="${TEMP_NAME%-*}"
          else
            echo "Error: No rockspec file found in the root directory."
            exit 1
          fi
          echo "package-name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"

  matrix:
    name: Setup Matrix
    runs-on: ubuntu-latest
    outputs:
      os: ${{ steps.os-matrix.outputs.os }}
    steps:
      - name: Determine OS matrix
        id: os-matrix
        run: |
          OS_LIST=""
          [ "${{ inputs.linux   }}" = "true" ] && OS_LIST="$OS_LIST, \"ubuntu-latest\""
          [ "${{ inputs.macos   }}" = "true" ] && OS_LIST="$OS_LIST, \"macos-latest\""
          [ "${{ inputs.windows }}" = "true" ] && OS_LIST="$OS_LIST, \"windows-latest\""
          OS_LIST="[${OS_LIST#, }]"
          [ "$OS_LIST" = "[]" ] && OS_LIST='["ubuntu-latest"]'
          echo "os=$OS_LIST" >> "$GITHUB_OUTPUT"

  changes:
    name: Change Detection
    runs-on: ubuntu-latest
    outputs:
      run-stylua: ${{ steps.filter.outputs.stylua }}
      run-luacheck: ${{ steps.filter.outputs.luacheck }}
      run-markdownlint: ${{ steps.filter.outputs.markdownlint }}
      run-tests: ${{ steps.filter.outputs.tests }}
      run-docs: ${{ steps.filter.outputs.types }}
      run-release-please: ${{ steps.filter.outputs.release_please }}
      run-luarocks: ${{ steps.filter.outputs.rockspec }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for changes
        if: ${{ github.event_name != 'workflow_dispatch' }}
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            stylua:
              - '**/*.lua'
              - '.stylua.toml'
            luacheck:
              - 'src/**/*.lua'
              - 'lua/**/*.lua'
            markdownlint:
              - '**/*.md'
              - '!(CHANGELOG).md'
              - '.markdownlint*'
            tests:
              - '.busted'
              - '*.rockspec'
              - '**/*.c'
              - '**/*.h'
              - '**/*.test.lua'
              - 'lua/**/*.lua'
              - 'src/**/*.lua'
              - 'tests/**'
            release_please:
              - 'src/**'
              - 'lua/**'
              - '.github/release-please-manifest.json'
            types:
              - '**/*.d.lua'
            rockspec:
              - '*.rockspec'

  stylua:
    needs: changes
    if: ${{ needs.changes.outputs.run-stylua == 'true' || inputs.stylua }}
    name: StyLua
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run StyLua
        uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .

  luacheck:
    needs: [changes, metadata]
    if: ${{ needs.changes.outputs.run-luacheck == 'true' || inputs.luacheck }}
    name: Luacheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Luacheck
        uses: lunarmodules/luacheck@v1
        with:
          args: ${{ needs.metadata.outputs.source-dir }}

  markdownlint:
    needs: changes
    if: ${{ needs.changes.outputs.run-markdownlint == 'true' || inputs.markdownlint }}
    name: Markdownlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run markdownlint-cli2
        run: npx markdownlint-cli2 "**/*.md" "#CHANGELOG.md"

  tests:
    needs: [changes, matrix, metadata]
    if: ${{ needs.changes.outputs.run-tests == 'true' || inputs.tests }}
    name: Run Tests (${{ matrix.os }}, ${{ matrix.lua-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        lua-version: ["5.1", "5.2", "5.3", "5.4", "5.5", "luajit"]
        os: ${{ fromJSON(needs.matrix.outputs.os) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup MSVC Developer Command Prompt
        if: ${{ runner.os == 'Windows' && matrix['lua-version'] != 'luajit' }}
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Lua
        uses: luarocks/gh-actions-lua@master
        with:
          luaVersion: ${{ matrix.lua-version }}

      - name: Install LuaRocks
        uses: luarocks/gh-actions-luarocks@master

      - name: Run custom setup commands
        if: ${{ inputs.run != '' }}
        shell: bash
        env:
          SETUP_COMMANDS: ${{ inputs.run }}
        run: bash -c "$SETUP_COMMANDS"

      - name: Install package
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: luarocks install *.rockspec

      - name: Install package
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $rockspec = Get-ChildItem -Path . -Filter "*.rockspec" | Select-Object -First 1
          if (-not $rockspec) {
            throw "No rockspec file found"
          }
          luarocks install "$($rockspec.FullName)"

      - name: Install Busted
        run: luarocks install busted

      - name: Run Tests
        run: busted

  docs:
    needs: changes
    if: ${{ inputs.docs || (needs.changes.outputs.run-docs == 'true' && github.ref_name == 'main') }}
    name: Docs
    permissions:
      contents: write
      pull-requests: write
    uses: BlueLua/bluelua.github.io/.github/workflows/docs.yml@main
    with:
      repo: ${{ github.event.repository.name }}
    secrets: inherit

  release-please:
    needs: changes
    if: ${{ inputs.release-please || (needs.changes.outputs.run-release-please == 'true' && github.ref_name == 'main') }}
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/release-please-manifest.json

  publish-luarocks:
    needs: [tests, changes, metadata]
    if: ${{ inputs.luarocks-upload || startsWith(github.ref, 'refs/tags/') || (needs.changes.outputs.run-luarocks == 'true' && github.ref_name == 'main') }}
    name: Publish to LuaRocks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Lua
        uses: luarocks/gh-actions-lua@master
        with:
          luaVersion: "5.5"

      - name: Install LuaRocks
        uses: luarocks/gh-actions-luarocks@master

      - name: Build and Upload to LuaRocks
        shell: bash
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          ROCKSPEC=$(find . -maxdepth 1 -name "*.rockspec" -print -quit)
          if [ -z "$ROCKSPEC" ]; then
            echo "No rockspec file found in the root directory!"
            exit 1
          fi

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            raw_version="${{ github.ref_name }}"
            raw_version="${raw_version#v}"
            VERSION="${raw_version}-1"
            TAG_VAL="v${raw_version}"
            ROCKSPEC_FILENAME="${{ needs.metadata.outputs.package-name }}-${VERSION}.rockspec"
            sed -e "s/version = .*/version = \"${VERSION}\"/" \
                -e "s/source = {/source = {\n  tag = \"${TAG_VAL}\",/" \
                "$ROCKSPEC" > "$ROCKSPEC_FILENAME"
          else
            ROCKSPEC_FILENAME=$(basename "$ROCKSPEC")
          fi

          echo "Generated/loaded rockspec content:"
          cat "$ROCKSPEC_FILENAME"

          # Upload to LuaRocks
          luarocks upload "$ROCKSPEC_FILENAME" --api-key="${LUAROCKS_API_KEY}" --force
