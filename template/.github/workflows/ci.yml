name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      linux:
        description: "Linux"
        type: boolean
        default: __LINUX__
      macos:
        description: "macOS"
        type: boolean
        default: __MACOS__
      windows:
        description: "Windows"
        type: boolean
        default: __WINDOWS__
      stylua:
        description: "StyLua"
        type: boolean
        default: false
      luacheck:
        description: "Luacheck"
        type: boolean
        default: false
      lua-language-server:
        description: "LLS"
        type: boolean
        default: false
      markdownlint:
        description: "Markdownlint"
        type: boolean
        default: false
      prettier:
        description: "Prettier"
        type: boolean
        default: false
      shfmt:
        description: "shfmt"
        type: boolean
        default: false
      tests:
        description: "Tests"
        type: boolean
        default: false
      release-please:
        description: "Release Please"
        type: boolean
        default: false
      publish-dev:
        description: "Publish dev"
        type: boolean
        default: false
      publish-release:
        description: "Publish release"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    uses: BlueLua/.github/.github/workflows/ci.yml@main
    secrets: inherit
    # prettier-ignore
    with:
      linux:   ${{ github.event_name == 'workflow_dispatch' && inputs.linux   || __LINUX__ }}
      macos:   ${{ github.event_name == 'workflow_dispatch' && inputs.macos   || __MACOS__ }}
      windows: ${{ github.event_name == 'workflow_dispatch' && inputs.windows || __WINDOWS__ }}

      tests:               ${{ inputs.tests               || false }}
      stylua:              ${{ inputs.stylua              || false }}
      luacheck:            ${{ inputs.luacheck            || false }}
      lua-language-server: ${{ inputs.lua-language-server || false }}
      markdownlint:        ${{ inputs.markdownlint        || false }}
      prettier:            ${{ inputs.prettier            || false }}
      shfmt:               ${{ inputs.shfmt               || false }}

      release-please:  ${{ inputs.release-please  || false }}
      publish-dev:     ${{ inputs.publish-dev     || false }}
      publish-release: ${{ inputs.publish-release || false }}
